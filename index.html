<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisi Telemetria V-Dipole - Meteor M2-3</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; color: white; font-family: monospace; }
        #canvas-container { width: 100vw; height: 100vh; }
        
        /* HUD Superiore */
        #satellite-banner {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.85); padding: 10px 25px; 
            border: 1px solid #00ffcc; border-radius: 8px; pointer-events: auto;
            color: #00ffcc; font-weight: bold; font-size: 16px; letter-spacing: 1px;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.2); z-index: 10;
        }

        .panel { position: absolute; background: rgba(10, 10, 10, 0.85); padding: 15px; border: 1px solid #333; border-radius: 8px; pointer-events: auto; }
        #ui-dynamic { top: 20px; left: 20px; width: 300px; }
        #ui-static { top: 20px; right: 20px; width: 240px; }
        
        h2 { margin: 0 0 10px 0; font-size: 15px; color: #00ffcc; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .data-row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
        .highlight { color: #ffaa00; font-weight: bold; }
        #status-msg { font-size: 13px; margin-bottom: 12px; font-weight: bold; border-radius: 4px; padding: 4px; text-align: center; }

        #skyplot-container { margin-top: 15px; text-align: center; }
        #skyplot { background: rgba(0,0,0,0.5); border-radius: 50%; border: 1px solid #555; }

        /* Controlli Inferiori */
        #controls {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(10, 10, 10, 0.85); padding: 15px; border-radius: 8px;
            border: 1px solid #333; display: flex; flex-direction: column; gap: 10px; width: 600px; z-index: 10;
            box-sizing: border-box;
        }
        .control-row { display: flex; gap: 10px; align-items: center; justify-content: space-between; }
        
        select, button { background: #222; color: #00ffcc; border: 1px solid #555; padding: 6px 10px; font-family: monospace; border-radius: 4px; cursor: pointer; }
        select:hover, button:hover { background: #333; }
        #play-pause-btn { width: 80px; font-weight: bold; text-align: center; }
        input[type=range] { flex-grow: 1; cursor: ew-resize; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/satellite.js/4.1.3/satellite.min.js"></script>
</head>
<body>

    <div id="satellite-banner">
        METEOR M2-3
    </div>

    <div id="ui-dynamic" class="panel">
        <h2>Stato Segnale</h2>
        <div id="status-msg" style="color: #ffaa00; background: rgba(255,170,0,0.1);">IN ATTESA DATI ORBITALI...</div>
        <div class="data-row"><span>Azimut:</span><span id="az-val" class="highlight">--.-°</span></div>
        <div class="data-row"><span>Elevazione:</span><span id="el-val" class="highlight">--.-°</span></div>
        <hr style="border-color: #333; margin: 10px 0;">
        <div class="data-row"><span>Slant Range:</span><span id="range-val">--.- km</span></div>
        <div class="data-row"><span>Range Rate:</span><span id="rangerate-val">--.- km/s</span></div>
        <div class="data-row"><span>Doppler Shift:</span><span id="doppler-val">-- Hz</span></div>
        <div class="data-row"><span>RX Freq:</span><span id="freq-val" style="color:#00ffcc; font-weight:bold;">137.900.000 Hz</span></div>
    </div>

    <div id="ui-static" class="panel">
        <h2>Geometria Passaggio</h2>
        <div class="data-row"><span>Stazione:</span><span id="obs-pos">--</span></div>
        <div class="data-row"><span>Orient. V-Dipole:</span><span id="ant-az" style="color:#00ffcc;">--.-°</span></div>
        <hr style="border-color: #333; margin: 10px 0;">
        <div class="data-row"><span>AOS:</span><span id="aos-loc">--:--:--</span></div>
        <div class="data-row"><span>Max El:</span><span id="max-el" class="highlight">--.-°</span></div>
        <div class="data-row"><span>TCA:</span><span id="tca-loc">--:--:--</span></div>
        <div class="data-row"><span>LOS:</span><span id="los-loc">--:--:--</span></div>
        <div id="skyplot-container">
            <canvas id="skyplot" width="180" height="180"></canvas>
        </div>
    </div>

    <div id="controls">
        <div class="control-row">
            <select id="pass-select" disabled style="flex-grow: 1; min-width: 0;"><option>Ricerca passaggi ottimali...</option></select>
            <button id="play-pause-btn">Pausa</button>
            <select id="speed-select">
                <option value="1" selected>1x</option>
                <option value="5">5x</option>
                <option value="10">10x</option>
                <option value="30">30x</option>
            </select>
        </div>
        <div class="control-row">
            <span id="sim-loc" style="font-size: 12px; width: 60px;">--:--:--</span>
            <input type="range" id="timeline" min="0" max="100" value="0" step="1" disabled>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- CORE 3D ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
        camera.position.set(120, 80, 150);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.getElementById('canvas-container').appendChild(renderer.domElement);
        
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        const gridRadius = 100;
        scene.add(new THREE.PolarGridHelper(gridRadius, 16, 8, 64, 0x00ffcc, 0x222222));
        
        const domeMat = new THREE.MeshBasicMaterial({ color: 0x113355, wireframe: true, transparent: true, opacity: 0.15 });
        scene.add(new THREE.Mesh(new THREE.SphereGeometry(gridRadius, 32, 16, 0, Math.PI * 2, 0, Math.PI / 2), domeMat));

        // PUNTI CARDINALI ANCORATI
        function createGroundLabel(text, color, x, z) {
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 256;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = color; 
            ctx.font = 'bold 100px monospace';
            ctx.textAlign = 'center'; 
            ctx.textBaseline = 'middle'; 
            ctx.fillText(text, 128, 128);
            
            const texture = new THREE.CanvasTexture(canvas);
            texture.anisotropy = renderer.capabilities.getMaxAnisotropy();
            
            const mat = new THREE.MeshBasicMaterial({ map: texture, transparent: true, depthWrite: false });
            const plane = new THREE.Mesh(new THREE.PlaneGeometry(25, 25), mat);
            
            plane.rotation.x = -Math.PI / 2; 
            plane.position.set(x, 0.5, z);   
            return plane;
        }
        
        scene.add(createGroundLabel('N', '#ff4444', 0, -gridRadius - 15));
        scene.add(createGroundLabel('S', '#ffffff', 0, gridRadius + 15));
        scene.add(createGroundLabel('E', '#ffffff', gridRadius + 15, 0));
        scene.add(createGroundLabel('W', '#ffffff', -gridRadius - 15, 0));

        // --- LINEA SOGLIA DI LOCK (15 GRADI) ---
        const LOCK_THRESHOLD_DEG = 15;
        const lockRadius = gridRadius * Math.cos(LOCK_THRESHOLD_DEG * Math.PI/180);
        const lockHeight = gridRadius * Math.sin(LOCK_THRESHOLD_DEG * Math.PI/180);
        const lockPoints = [];
        for(let i=0; i<=64; i++) {
            const theta = (i/64) * Math.PI * 2;
            lockPoints.push(new THREE.Vector3(lockRadius * Math.sin(theta), lockHeight, -lockRadius * Math.cos(theta)));
        }
        const lockCircleGeo = new THREE.BufferGeometry().setFromPoints(lockPoints);
        const lockCircle = new THREE.Line(lockCircleGeo, new THREE.LineDashedMaterial({
            color: 0x00ffcc, transparent: true, opacity: 0.6, dashSize: 2, gapSize: 2
        }));
        lockCircle.computeLineDistances(); // Necessario per LineDashedMaterial
        scene.add(lockCircle);

        // --- COSTRUZIONE MODELLO V-DIPOLE ---
        const vDipoleGroup = new THREE.Group();
        
        // Palo centrale
        const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 12, 8), new THREE.MeshStandardMaterial({color: 0x555555, metalness: 0.5}));
        mast.position.y = 6;
        vDipoleGroup.add(mast);

        // Braccio Sinistro
        const armLeftGroup = new THREE.Group();
        const armLeft = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 15, 8), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.8}));
        armLeft.rotation.x = Math.PI / 2;
        armLeft.position.z = -7.5;
        armLeftGroup.add(armLeft);
        armLeftGroup.rotation.y = (Math.PI / 180) * 60; // Metà dei 120°
        armLeftGroup.position.y = 12;

        // Braccio Destro
        const armRightGroup = new THREE.Group();
        const armRight = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 15, 8), new THREE.MeshStandardMaterial({color: 0xcccccc, metalness: 0.8}));
        armRight.rotation.x = Math.PI / 2;
        armRight.position.z = -7.5;
        armRightGroup.add(armRight);
        armRightGroup.rotation.y = (Math.PI / 180) * -60; // Metà dei 120°
        armRightGroup.position.y = 12;

        vDipoleGroup.add(armLeftGroup);
        vDipoleGroup.add(armRightGroup);
        scene.add(vDipoleGroup);

        // Illuminazione per rendere visibili i materiali
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(50, 100, 50);
        scene.add(dirLight);

        // Asset Dinamici Satellite
        const satMesh = new THREE.Mesh(new THREE.BoxGeometry(4, 4, 4), new THREE.MeshBasicMaterial({ color: 0xffaa00 }));
        scene.add(satMesh);
        const pointingLine = new THREE.Line(new THREE.BufferGeometry(), new THREE.LineBasicMaterial({ color: 0xff4444, linewidth: 2 }));
        scene.add(pointingLine);
        let pathLine = null;

        function getCartesian(azDeg, elDeg, radius) {
            const azRad = azDeg * (Math.PI / 180);
            const elRad = elDeg * (Math.PI / 180);
            return new THREE.Vector3(
                radius * Math.cos(elRad) * Math.sin(azRad),
                radius * Math.sin(elRad),
                -radius * Math.cos(elRad) * Math.cos(azRad)
            );
        }

        // --- SISTEMA DATI & SGP4 ---
        const C_LIGHT = 299792.458; 
        const METEOR_FREQ = 137900000; 
        let passes = [];
        let currentPassData = [];
        let currentIndex = 0;
        let lastFrameTime = performance.now();
        let fractionalIndex = 0;
        let isPlaying = true;

        const domElements = {
            status: document.getElementById('status-msg'),
            az: document.getElementById('az-val'), el: document.getElementById('el-val'),
            range: document.getElementById('range-val'), rate: document.getElementById('rangerate-val'),
            doppler: document.getElementById('doppler-val'), freq: document.getElementById('freq-val'),
            obsPos: document.getElementById('obs-pos'), antAz: document.getElementById('ant-az'),
            aosLoc: document.getElementById('aos-loc'), losLoc: document.getElementById('los-loc'),
            maxEl: document.getElementById('max-el'), tcaLoc: document.getElementById('tca-loc'),
            simLoc: document.getElementById('sim-loc'), timeline: document.getElementById('timeline'),
            passSelect: document.getElementById('pass-select'), speedSelect: document.getElementById('speed-select'),
            playPauseBtn: document.getElementById('play-pause-btn')
        };

        function formatTimeOnly(date) { return date.toLocaleTimeString('it-IT'); }

        async function fetchTLE() {
            try {
                const response = await fetch('https://celestrak.org/NORAD/elements/gp.php?CATNR=57166&FORMAT=tle');
                if(!response.ok) throw new Error("Fetch fallito");
                const text = await response.text();
                const lines = text.trim().split('\n');
                return { line1: lines[1].trim(), line2: lines[2].trim() };
            } catch (err) {
                return {
                    line1: "1 57166U 23091A   26167.18506164 -.00000006  00000-0  16008-4 0  9999",
                    line2: "2 57166  98.6090 222.1839 0004302 158.0796 202.0568 14.24046703154375"
                };
            }
        }

        function computePasses(tle, lat, lon) {
            const satrec = satellite.twoline2satrec(tle.line1, tle.line2);
            const observerGd = { longitude: satellite.degreesToRadians(lon), latitude: satellite.degreesToRadians(lat), height: 0.1 };
            const now = new Date();
            let foundPasses = [], currentPass = null;
            
            for (let i = 0; i < 5 * 24 * 60; i++) {
                const time = new Date(now.getTime() + (i * 60000));
                const posVel = satellite.propagate(satrec, time);
                if (!posVel.position) continue;
                const lookAngles = satellite.ecfToLookAngles(observerGd, satellite.eciToEcf(posVel.position, satellite.gstime(time)));
                if (satellite.radiansToDegrees(lookAngles.elevation) > 0) {
                    if (!currentPass) currentPass = { start: new Date(time.getTime() - 60000), end: null };
                } else if (currentPass) {
                    currentPass.end = time;
                    foundPasses.push(currentPass);
                    currentPass = null;
                }
            }

            const detailedPasses = [];
            foundPasses.forEach(pass => {
                const points = [];
                let maxEl = -90;
                let tcaTime = null;
                let prevRange = null;
                
                for(let t = pass.start.getTime(); t <= pass.end.getTime(); t += 1000) {
                    const timeObj = new Date(t);
                    const posVel = satellite.propagate(satrec, timeObj);
                    if (!posVel.position) continue;
                    const lookAngles = satellite.ecfToLookAngles(observerGd, satellite.eciToEcf(posVel.position, satellite.gstime(timeObj)));
                    const el = satellite.radiansToDegrees(lookAngles.elevation);
                    
                    if (el >= 0) {
                        const az = satellite.radiansToDegrees(lookAngles.azimuth);
                        const range = lookAngles.rangeSat;
                        const rangeRate = prevRange ? (range - prevRange) : 0; 
                        
                        if (el > maxEl) { maxEl = el; tcaTime = timeObj; }
                        points.push({ time: timeObj, az: az, el: el, range: range, rangeRate: rangeRate });
                        prevRange = range;
                    }
                }
                
                if (points.length > 0 && maxEl >= 50) {
                    detailedPasses.push({ points: points, aos: points[0].time, los: points[points.length - 1].time, maxEl: maxEl, tca: tcaTime });
                }
            });
            return detailedPasses;
        }

        // --- SKYPLOT RENDERING ---
        function drawSkyplot(passData, currIdx) {
            const canvas = document.getElementById('skyplot');
            const ctx = canvas.getContext('2d');
            const width = canvas.width, height = canvas.height;
            const cx = width/2, cy = height/2, radius = (width/2) - 10;

            ctx.clearRect(0, 0, width, height);
            ctx.strokeStyle = '#444'; ctx.lineWidth = 1; ctx.fillStyle = '#888'; ctx.font = "10px monospace";
            [0, 30, 60].forEach(el => {
                const r = radius * ((90 - el) / 90);
                ctx.beginPath(); ctx.arc(cx, cy, r, 0, 2*Math.PI); ctx.stroke();
                if(el > 0) ctx.fillText(el+'°', cx + 2, cy - r + 10);
            });
            
            // Cerchio verde per mostrare la Lock Zone anche sullo Skyplot
            const rLock = radius * ((90 - LOCK_THRESHOLD_DEG) / 90);
            ctx.strokeStyle = 'rgba(0, 255, 204, 0.3)';
            ctx.beginPath(); ctx.arc(cx, cy, rLock, 0, 2*Math.PI); ctx.stroke();

            ctx.strokeStyle = '#444';
            ctx.beginPath(); ctx.moveTo(cx, 10); ctx.lineTo(cx, height-10); ctx.moveTo(10, cy); ctx.lineTo(width-10, cy); ctx.stroke();
            ctx.fillText('N', cx - 4, 10); ctx.fillText('S', cx - 4, height - 2);

            ctx.strokeStyle = '#3355ff'; ctx.lineWidth = 2;
            ctx.beginPath();
            passData.forEach((p, i) => {
                const r = radius * ((90 - p.el) / 90);
                const x = cx + r * Math.sin(p.az * Math.PI/180);
                const y = cy - r * Math.cos(p.az * Math.PI/180);
                if(i===0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            });
            ctx.stroke();

            if(passData[currIdx]) {
                const p = passData[currIdx];
                const r = radius * ((90 - p.el) / 90);
                const x = cx + r * Math.sin(p.az * Math.PI/180);
                const y = cy - r * Math.cos(p.az * Math.PI/180);
                ctx.fillStyle = p.el >= LOCK_THRESHOLD_DEG ? '#00ffcc' : '#ff4444';
                ctx.beginPath(); ctx.arc(x, y, 4, 0, 2*Math.PI); ctx.fill();
            }
        }

        function loadPass(index) {
            const pass = passes[index];
            currentPassData = pass.points;
            currentIndex = 0; fractionalIndex = 0;
            
            // Calcolo Azimut Ottimale V-Dipole al TCA
            const tcaPoint = currentPassData.find(p => p.time.getTime() === pass.tca.getTime());
            if (tcaPoint) {
                // Posizionamento V-Dipole in base all'azimut del passaggio al TCA. 
                // La "faccia" frontale guarda direttamente l'azimut di massima altezza.
                vDipoleGroup.rotation.y = -tcaPoint.az * (Math.PI / 180);
                domElements.antAz.innerText = tcaPoint.az.toFixed(1) + '°';
            }

            domElements.aosLoc.innerText = formatTimeOnly(pass.aos);
            domElements.maxEl.innerText = pass.maxEl.toFixed(1) + '°';
            domElements.tcaLoc.innerText = formatTimeOnly(pass.tca);
            domElements.losLoc.innerText = formatTimeOnly(pass.los);
            
            domElements.timeline.max = currentPassData.length - 1;
            domElements.timeline.value = 0; domElements.timeline.disabled = false;

            const pathPoints = currentPassData.map(d => getCartesian(d.az, d.el, gridRadius));
            if(pathLine) scene.remove(pathLine);
            pathLine = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pathPoints), new THREE.LineBasicMaterial({ color: 0x555555, linewidth: 2 }));
            scene.add(pathLine);

            updateVisuals();
        }

        function initTracker(lat, lon) {
            domElements.obsPos.innerText = `${lat.toFixed(4)}°, ${lon.toFixed(4)}°`;
            
            fetchTLE().then(tle => {
                passes = computePasses(tle, lat, lon);
                if(passes.length === 0) { 
                    domElements.status.innerText = "NESSUN PASSAGGIO UTILE"; 
                    domElements.status.style.background = "rgba(255,68,68,0.2)";
                    domElements.passSelect.options[0].text = "Nessun dato ottimale";
                    return; 
                }
                
                passes.forEach((pass, i) => {
                    const dateStr = pass.aos.toLocaleDateString('it-IT');
                    const timeStr = pass.aos.toLocaleTimeString('it-IT');
                    const label = `Ottimale ${i+1}: ${dateStr} - ${timeStr} [Max: ${pass.maxEl.toFixed(0)}°]`;
                    domElements.passSelect.add(new Option(label, i));
                });
                domElements.passSelect.remove(0);
                domElements.passSelect.disabled = false;
                loadPass(0);
            });
        }

        if (navigator.geolocation) navigator.geolocation.getCurrentPosition(p => initTracker(p.coords.latitude, p.coords.longitude), e => initTracker(41.9, 12.5));
        else initTracker(41.9, 12.5);

        // --- CONTROLLI UI E LOOP PRINCIPALE ---
        
        domElements.passSelect.addEventListener('change', e => loadPass(parseInt(e.target.value)));
        
        domElements.playPauseBtn.addEventListener('click', () => {
            isPlaying = !isPlaying;
            domElements.playPauseBtn.innerText = isPlaying ? "Pausa" : "Play";
        });

        domElements.timeline.addEventListener('input', e => { 
            isPlaying = false; 
            domElements.playPauseBtn.innerText = "Play";
            currentIndex = parseInt(e.target.value); 
            fractionalIndex = currentIndex; 
            updateVisuals(); 
        });

        function updateVisuals() {
            if(currentPassData.length === 0) return;
            const p = currentPassData[currentIndex];
            
            // 3D Update
            const pos = getCartesian(p.az, p.el, gridRadius);
            satMesh.position.copy(pos);
            pointingLine.geometry.setFromPoints([new THREE.Vector3(0,5,0), pos]);

            // LOGICA DI LOCK (Elevazione > 15°)
            if (p.el >= LOCK_THRESHOLD_DEG) {
                pointingLine.material.color.setHex(0x00ffcc);
                domElements.status.innerText = "SEGNALE AGGANCIATO (LOCK)";
                domElements.status.style.color = "#00ffcc";
                domElements.status.style.background = "rgba(0,255,204,0.15)";
            } else {
                pointingLine.material.color.setHex(0xff4444);
                domElements.status.innerText = "IN ATTESA DI LOCK...";
                domElements.status.style.color = "#ff4444";
                domElements.status.style.background = "rgba(255,68,68,0.15)";
            }

            // Doppler
            const dopplerShiftHz = -(p.rangeRate / C_LIGHT) * METEOR_FREQ;
            const targetFreq = METEOR_FREQ + dopplerShiftHz;

            // UI Update
            domElements.simLoc.innerText = formatTimeOnly(p.time);
            domElements.az.innerText = p.az.toFixed(1) + '°';
            domElements.el.innerText = p.el.toFixed(1) + '°';
            domElements.range.innerText = p.range.toFixed(1) + ' km';
            domElements.rate.innerText = p.rangeRate.toFixed(3) + ' km/s';
            
            const sign = dopplerShiftHz > 0 ? '+' : '';
            domElements.doppler.innerText = sign + dopplerShiftHz.toFixed(0) + ' Hz';
            domElements.freq.innerText = (targetFreq / 1e6).toFixed(6) + ' MHz';

            drawSkyplot(currentPassData, currentIndex);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            const now = performance.now();
            const deltaSec = (now - lastFrameTime) / 1000;
            lastFrameTime = now;
            
            const speed = parseFloat(domElements.speedSelect.value);
            
            if (isPlaying && currentPassData.length > 0) {
                fractionalIndex += deltaSec * speed;
                if (Math.floor(fractionalIndex) > currentIndex) {
                    currentIndex = Math.floor(fractionalIndex);
                    if (currentIndex >= currentPassData.length) { 
                        currentIndex = currentPassData.length - 1; 
                        isPlaying = false; 
                        domElements.playPauseBtn.innerText = "Play"; 
                    }
                    domElements.timeline.value = currentIndex;
                    updateVisuals();
                }
            }
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; 
            camera.updateProjectionMatrix(); 
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
